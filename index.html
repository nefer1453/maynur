<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maynur - Sade ve Net</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #1f2937; font-family: sans-serif; }
        .product-btn { transition: all 0.2s; border: 3px solid #f3f4f6; min-height: 90px; font-size: 1.4rem; font-weight: 800; border-radius: 24px; }
        .selected { background-color: #16a34a !important; color: white !important; border-color: #15803d !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white border-b-4 border-orange-500 p-5 sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic text-orange-600 tracking-tighter">MAYNUR</h1>
            <button onclick="toggleEditMode()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-xs uppercase shadow-md">⚙️ DÜZENLE</button>
        </div>
        <div id="progress-text" class="text-sm font-bold mt-2 text-green-700 uppercase text-center bg-green-50 rounded-lg py-1"></div>
    </header>

    <main class="p-4 pb-48">
        <div id="step-container" class="space-y-4"></div>
    </main>

    <div id="quantity-modal" class="modal p-4">
        <div class="bg-white rounded-[40px] p-8 w-full max-w-md shadow-2xl border-t-8 border-orange-500">
            <h3 id="modal-title" class="text-3xl font-black text-center mb-8 text-orange-600">NE KADAR?</h3>
            <div id="quantity-options" class="grid grid-cols-2 gap-4"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-5 bg-gray-100 font-bold rounded-2xl text-xl text-gray-500">İPTAL</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 z-50 flex gap-3 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
        <button id="prev-btn" onclick="prevStep()" class="flex-1 bg-gray-100 text-gray-600 font-black py-6 rounded-3xl text-xl hidden uppercase">GERİ</button>
        <button id="next-btn" onclick="handleMainAction()" class="flex-[2] bg-orange-500 text-white font-black py-6 rounded-3xl shadow-lg text-2xl uppercase">DEVAM ➡️</button>
    </div>

    <script>
        const initialData = {
            "🍎 MANAV": { type: "kg", items: ["Domates", "Salatalık", "Biber", "Patates", "Soğan", "Sarımsak", "Patlıcan", "Kabak", "Marul", "Maydanoz", "Limon", "Ispanak", "Mantar", "Elma", "Muz", "Portakal", "Çilek"] },
            "🥩 KASAP & TAVUK": { type: "kg", items: ["Dana Kıyma", "Dana Kuşbaşı", "Antrikot", "Dana Biftek", "Kangal Sucuk", "Kavurma", "Pastırma", "Tavuk Baget", "Tavuk Kanat", "Tavuk İncik", "Tavuk Kelebek", "Tavuk Göğsü", "Tavuk Pirzola", "Bütün Tavuk", "Tavuk Ciğer"] },
            "🧀 KAHVALTILIK": { type: "kg_adet", items: ["Beyaz Peynir", "Kaşar Peyniri", "Eski Kaşar", "Zeytin (Siyah)", "Zeytin (Yeşil)", "Yumurta", "Tereyağı", "Süt", "Yoğurt", "Bal", "Pekmez", "Tahin", "Çokokrem"] },
            "🧼 TEMİZLİK": { type: "adet", items: ["Deterjan", "Yumuşatıcı", "Bulaşık Tableti", "Çamaşır Suyu", "Kağıt Havlu", "Tuvalet Kağıdı", "Sabun", "Şampuan", "Peçete", "Çöp Torbası"] },
            "🌾 BAKLİYAT & YAĞ": { type: "kg_adet", items: ["Pirinç", "Mercimek", "Bulgur", "Makarna", "Nohut", "Kuru Fasulye", "Un", "Şeker", "Çay", "Kahve", "Salça", "Ayçiçek Yağı", "Zeytinyağı"] },
            "🥨 ABUR CUBUR & İÇECEK": { type: "adet", items: ["Cips", "Bisküvi", "Çikolata", "Kuruyemiş", "Kraker", "Gofret", "Kola", "Fanta / Gazoz", "Meyve Suyu", "Soda", "Su (5 Lt / Damacana)", "Ice Tea"] }
        };

        let userSettings = JSON.parse(localStorage.getItem('maynur_settings')) || { hiddenItems: [] };
        const categories = Object.keys(initialData);
        let currentStep = 0;
        let selections = {};
        let isEditMode = false;
        let pendingItem = null;

        function toggleEditMode() {
            isEditMode = !isEditMode;
            render();
        }

        function hideItem(item) {
            if (!userSettings.hiddenItems.includes(item)) userSettings.hiddenItems.push(item);
            else userSettings.hiddenItems = userSettings.hiddenItems.filter(i => i !== item);
            localStorage.setItem('maynur_settings', JSON.stringify(userSettings));
            render();
        }

        function render() {
            const container = document.getElementById('step-container');
            const catName = categories[currentStep];
            const info = initialData[catName];
            
            document.getElementById('progress-text').innerText = `${catName} (${currentStep + 1}/${categories.length})`;
            document.getElementById('prev-btn').style.display = currentStep > 0 ? "block" : "none";
            document.getElementById('next-btn').innerText = currentStep === categories.length - 1 ? "BİTİR VE PAYLAŞ ✅" : "SIRADAKİ BÖLÜM ➡️";

            container.innerHTML = info.items.map(item => {
                const isHidden = userSettings.hiddenItems.includes(item);
                if (isHidden && !isEditMode) return '';
                return `
                    <div class="relative flex gap-2">
                        <button onclick="itemClick('${item}')" class="product-btn flex-grow bg-white flex items-center justify-between px-8 ${selections[item] ? 'selected' : 'text-gray-700'} ${isHidden ? 'opacity-20' : ''}">
                            <span>${item}</span>
                            <span class="text-sm font-black bg-gray-100 text-gray-500 px-3 py-1 rounded-full ${selections[item] ? 'bg-white text-green-700' : ''}">${selections[item] || '+'}</span>
                        </button>
                        ${isEditMode ? `<button onclick="hideItem('${item}')" class="bg-red-500 text-white w-16 rounded-[24px] font-black text-xl">X</button>` : ''}
                    </div>
                `;
            }).join('');
        }

        function itemClick(item) {
            if (isEditMode) { hideItem(item); return; }
            if (selections[item]) { delete selections[item]; render(); return; }
            pendingItem = item;
            showModal(item, initialData[categories[currentStep]].type);
        }

        function showModal(item, type) {
            const modal = document.getElementById('quantity-modal');
            const options = document.getElementById('quantity-options');
            document.getElementById('modal-title').innerText = item;
            options.innerHTML = '';
            let vals = (type === "kg") ? ["250 gr", "500 gr", "1 kg", "2 kg", "3 kg", "5 kg"] : 
                       (type === "adet") ? ["1 Adet", "2 Adet", "3 Adet", "5 Adet", "12'li", "Koli"] : ["500 gr", "1 kg", "1 Adet", "2 Adet"];
            vals.forEach(v => {
                options.innerHTML += `<button onclick="setQuantity('${v}')" class="py-8 bg-orange-50 text-orange-700 font-black rounded-3xl text-2xl border-2 border-orange-100">${v}</button>`;
            });
            modal.classList.add('active');
        }

        window.setQuantity = (v) => { selections[pendingItem] = v; closeModal(); render(); };
        window.closeModal = () => document.getElementById('quantity-modal').classList.remove('active');
        window.handleMainAction = () => { if (currentStep < categories.length - 1) { currentStep++; window.scrollTo(0,0); render(); } else finish(); };
        window.prevStep = () => { if (currentStep > 0) { currentStep--; window.scrollTo(0,0); render(); } };

        async function finish() {
            const list = Object.entries(selections).map(([k, v]) => `${k} (${v})`).join("\n- ");
            if (!list) return alert("Liste boş!");
            const msg = `🏠 MAYNUR EV LİSTESİ\n--------------------\n- ${list}`;
            if (navigator.share) await navigator.share({ text: msg });
            else alert("Kopyalandı!");
        }
        render();
    </script>
</body>
</html>
